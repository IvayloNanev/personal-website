<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#17110c">
  <meta name="description" content="A vintage dashboard-inspired unit converter.">
  <title>Grand Tour Unit Converter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Oswald:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <main class="dashboard-shell">
    <section class="converter" aria-labelledby="page-title">
      <header class="hero-panel">
        <div class="gauge" aria-hidden="true">
          <span class="gauge-number n1">0</span><span class="gauge-number n2">50</span>
          <span class="gauge-number n3">100</span><span class="gauge-number n4">150</span>
          <span class="needle"></span><span class="hub"></span>
        </div>
        <div class="hero-copy">
          <div class="crest" aria-hidden="true"><span>GT</span></div>
          <p class="eyebrow">The Grand Tour</p>
          <h1 id="page-title">Unit Converter</h1>
          <p id="route-label" class="route-label">Kilometers <span aria-hidden="true">◆</span> Miles</p>
        </div>
        <div class="gauge gauge-right" aria-hidden="true">
          <span class="gauge-number n1">0</span><span class="gauge-number n2">40</span>
          <span class="gauge-number n3">80</span><span class="gauge-number n4">120</span>
          <span class="needle"></span><span class="hub"></span>
        </div>
      </header>

      <div class="control-panel">
        <div class="category-tabs" role="group" aria-label="Measurement category">
          <button class="category active" data-category="distance" type="button">Distance</button>
          <button class="category" data-category="temperature" type="button">Temperature</button>
          <button class="category" data-category="weight" type="button">Weight</button>
        </div>

        <div class="field-group">
          <label for="from-value">From</label>
          <div class="field-row">
            <input id="from-value" inputmode="decimal" type="number" step="any" aria-describedby="conversion-note">
            <div class="select-wrap">
              <select id="from-unit" aria-label="Convert from unit"></select>
            </div>
          </div>
        </div>

        <button id="swap-button" class="swap-button" type="button" aria-label="Swap units">
          <span aria-hidden="true">⇅</span>
        </button>

        <div class="field-group">
          <label for="to-value">To</label>
          <div class="field-row">
            <output id="to-value" aria-live="polite"></output>
            <div class="select-wrap">
              <select id="to-unit" aria-label="Convert to unit"></select>
            </div>
          </div>
        </div>

        <button id="convert-button" class="convert-button" type="button">
          <span aria-hidden="true"></span>Convert<span aria-hidden="true"></span>
        </button>

        <section class="result-card is-empty" aria-labelledby="result-title">
          <h2 id="result-title">Result</h2>
          <p id="result-from"></p>
          <div class="equals" aria-hidden="true">=</div>
          <strong id="result-to"></strong>
          <div class="ornament" aria-hidden="true">— ❧ —</div>
        </section>

        <p id="conversion-note" class="conversion-note">ⓘ&nbsp; 1 kilometer = 0.621371 miles</p>
      </div>
    </section>
  </main>
  <script src="index.js"></script>
</body>
</html>
